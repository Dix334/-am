<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando...</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;1,300&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      background-color: #0c0b09;
      color: #f0ebe3;
      font-family: 'DM Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      flex-direction: column;
      gap: 0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    .preloader {
      text-align: center;
      width: 85%;
      max-width: 440px;
    }

    .file-label {
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(240, 235, 227, 0.2);
      display: block;
      margin-bottom: 32px;
    }

    .title-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 1.6rem;
      color: rgba(240, 235, 227, 0.8);
      margin-bottom: 48px;
      display: block;
      opacity: 0;
      animation: fadeIn 1.2s ease 0.3s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .loader-text {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(240, 235, 227, 0.35);
      margin-bottom: 14px;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.8s forwards;
    }

    .dots::after {
      content: '';
      animation: dots 1.4s steps(4, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }

    .progress-track {
      width: 100%;
      height: 1px;
      background-color: rgba(240, 235, 227, 0.08);
      position: relative;
      overflow: visible;
      opacity: 0;
      animation: fadeIn 0.8s ease 1s forwards;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, rgba(196, 112, 74, 0.5), rgba(184, 149, 106, 0.9));
      transition: width 9.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(196, 112, 74, 0.9);
      box-shadow: 0 0 8px rgba(196, 112, 74, 0.6);
    }

    .pct {
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      color: rgba(240, 235, 227, 0.2);
      margin-top: 12px;
      display: block;
      text-align: right;
      opacity: 0;
      animation: fadeIn 0.8s ease 1.2s forwards;
    }
  </style>
</head>
<body>

<div class="preloader">
  <span class="file-label">archivo 06</span>
  <span class="title-text">Estoy de vuelta</span>
  <div class="loader-text">Iniciando<span class="dots"></span></div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <span class="pct" id="pctLabel">0%</span>
</div>

<script>
window.addEventListener("load", () => {
  const fill = document.getElementById("progressFill");
  const label = document.getElementById("pctLabel");

  setTimeout(() => {
    fill.style.width = "100%";
  }, 200);

  // Update percentage
  let pct = 0;
  const interval = setInterval(() => {
    pct = Math.min(100, pct + Math.random() * 3 + 0.5);
    label.textContent = Math.floor(pct) + '%';
    if (pct >= 100) clearInterval(interval);
  }, 200);

  setTimeout(() => {
    window.location.href = "login.html";
  }, 10000);
});
</script>

</body>
</html>
