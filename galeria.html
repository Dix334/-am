<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galería — Archivo 06</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Mono:ital,wght@0,300;1,300&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0ebe0;
      --ink: #1a1612;
      --accent: #c4704a;
      --gold: #b8956a;
      --soft: #8c7b6b;
      --paper: #fefcf7;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 9999;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    header {
      text-align: center;
      padding: 60px 20px 20px;
      opacity: 0;
      animation: fadeUp 1s ease 0.2s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--soft);
      opacity: 0.6;
      display: block;
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 2.4rem;
      font-weight: 400;
      color: var(--ink);
      margin: 0;
    }

    /* Grid */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 32px;
      max-width: 900px;
      margin: 60px auto;
      padding: 0 24px 80px;
    }

    /* Polaroid card */
    .polaroid {
      background: white;
      padding: 14px 14px 48px;
      box-shadow: 2px 4px 16px rgba(0,0,0,0.1), 0 1px 3px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.35s ease;
      position: relative;
      opacity: 0;
      animation: popIn 0.6s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
    }

    .polaroid:nth-child(1) { transform: rotate(-2.5deg); animation-delay: 0.1s; }
    .polaroid:nth-child(2) { transform: rotate(1.8deg); animation-delay: 0.2s; }
    .polaroid:nth-child(3) { transform: rotate(-1.2deg); animation-delay: 0.3s; }
    .polaroid:nth-child(4) { transform: rotate(2.3deg); animation-delay: 0.4s; }
    .polaroid:nth-child(5) { transform: rotate(-1.8deg); animation-delay: 0.5s; }
    .polaroid:nth-child(6) { transform: rotate(0.9deg); animation-delay: 0.6s; }

    @keyframes popIn {
      from { opacity: 0; transform: rotate(var(--r, 0deg)) scale(0.85) translateY(20px); }
      to { opacity: 1; }
    }

    .polaroid:hover {
      transform: rotate(0deg) scale(1.06) translateY(-8px) !important;
      box-shadow: 6px 16px 40px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.1);
      z-index: 10;
    }

    /* Reveal effect */
    .polaroid-img-wrap {
      position: relative;
      overflow: hidden;
      background: #e8e0d0;
    }

    .polaroid img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      filter: sepia(12%) contrast(105%) saturate(95%);
      transition: filter 0.5s ease, transform 0.5s ease;
    }

    .polaroid:hover img {
      filter: sepia(0%) contrast(108%) saturate(105%);
      transform: scale(1.04);
    }

    /* Reveal overlay */
    .reveal-overlay {
      position: absolute;
      inset: 0;
      background: #e8e0d0;
      transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1);
      transform-origin: top;
    }

    .polaroid.revealed .reveal-overlay {
      transform: scaleY(0);
    }

    .polaroid-caption {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--soft);
      text-align: center;
      position: absolute;
      bottom: 12px;
      left: 0; right: 0;
      padding: 0 8px;
    }

    /* ——— LIGHTBOX ——— */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(12, 11, 9, 0.92);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      backdrop-filter: blur(6px);
    }

    .lightbox.active {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox-inner {
      max-width: 85vw;
      max-height: 85vh;
      text-align: center;
      transform: scale(0.92);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .lightbox.active .lightbox-inner {
      transform: scale(1);
    }

    .lightbox-img {
      max-width: 100%;
      max-height: 70vh;
      object-fit: contain;
      border-radius: 2px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.5);
      filter: sepia(5%) contrast(108%);
    }

    .lightbox-caption {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: rgba(240, 235, 227, 0.65);
      margin-top: 20px;
    }

    .lightbox-close {
      position: absolute;
      top: 20px; right: 24px;
      background: none; border: none;
      color: rgba(240, 235, 227, 0.4);
      font-size: 1.6rem;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      transition: color 0.2s;
    }

    .lightbox-close:hover { color: rgba(240, 235, 227, 0.9); }

    /* Nav */
    .lightbox-nav {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: none; border: 1px solid rgba(240,235,227,0.15);
      color: rgba(240, 235, 227, 0.5);
      font-size: 1.2rem;
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .lightbox-nav:hover {
      background: rgba(240,235,227,0.08);
      color: rgba(240,235,227,0.9);
    }

    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }

    /* Back nav */
    .back-link {
      position: fixed; top: 24px; left: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--soft);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }

    /* Add photo hint */
    .add-photo {
      background: transparent;
      border: 1.5px dashed rgba(140, 123, 107, 0.35);
      padding: 14px 14px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 228px;
      cursor: default;
      opacity: 0.4;
      transition: opacity 0.2s;
      position: relative;
    }

    .add-photo:hover { opacity: 0.6; }

    .add-photo-icon {
      font-size: 2rem;
      color: var(--soft);
      margin-bottom: 8px;
    }

    .add-photo-text {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--soft);
      text-transform: uppercase;
      text-align: center;
    }
  </style>
</head>
<body>

  <a href="next.html" class="back-link">← volver</a>

  <header>
    <span class="page-label">capítulo / galería</span>
    <h1>Momentos guardados</h1>
  </header>

  <div class="gallery" id="gallery">

    <div class="polaroid" data-src="img/imagen1.jpeg" data-caption="Un pequeño detalle de lo que idealizo por las noches">
      <div class="polaroid-img-wrap">
        <img src="img/imagen1.jpeg" alt="Momento 1" loading="lazy">
        <div class="reveal-overlay"></div>
      </div>
      <div class="polaroid-caption">La mejor vista</div>
    </div>

    <div class="polaroid" data-src="img/imagen2.jpeg" data-caption="Que belleza es verte, wey">
      <div class="polaroid-img-wrap">
        <img src="img/imagen2.jpeg" alt="Momento 2" loading="lazy">
        <div class="reveal-overlay"></div>
      </div>
      <div class="polaroid-caption">Bella, siempre</div>
    </div>

    <div class="polaroid" data-src="img/png5.jpeg" data-caption="✨">
      <div class="polaroid-img-wrap">
        <img src="img/png5.jpeg" alt="Sticker" loading="lazy" style="object-fit:contain; background:#f5f0e8;">
        <div class="reveal-overlay"></div>
      </div>
      <div class="polaroid-caption">Ñam</div>
    </div>

    <!-- Slots para agregar más fotos -->
    <div class="add-photo">
      <div class="add-photo-icon">＋</div>
      <div class="add-photo-text">foto futura</div>
    </div>

    <div class="add-photo">
      <div class="add-photo-icon">＋</div>
      <div class="add-photo-text">foto futura</div>
    </div>

    <div class="add-photo">
      <div class="add-photo-icon">＋</div>
      <div class="add-photo-text">foto futura</div>
    </div>

  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lbClose">✕</button>
    <button class="lightbox-nav lightbox-prev" id="lbPrev">←</button>
    <button class="lightbox-nav lightbox-next" id="lbNext">→</button>
    <div class="lightbox-inner">
      <img class="lightbox-img" id="lbImg" src="" alt="">
      <div class="lightbox-caption" id="lbCaption"></div>
    </div>
  </div>

  <script>
    // Reveal polaroids on scroll
    const polaroids = document.querySelectorAll('.polaroid');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add('revealed'), 300);
        }
      });
    }, { threshold: 0.3 });

    polaroids.forEach(p => observer.observe(p));

    // Lightbox
    const lightboxPhotos = [...polaroids].map(p => ({
      src: p.dataset.src,
      caption: p.dataset.caption
    })).filter(p => p.src);

    let currentLb = 0;
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbCaption = document.getElementById('lbCaption');

    function openLightbox(index) {
      currentLb = index;
      lbImg.src = lightboxPhotos[index].src;
      lbCaption.textContent = lightboxPhotos[index].caption || '';
      lb.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lb.classList.remove('active');
      document.body.style.overflow = '';
    }

    polaroids.forEach((p, i) => {
      if (!p.dataset.src) return;
      p.addEventListener('click', () => openLightbox(i));
    });

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    lb.addEventListener('click', (e) => { if (e.target === lb) closeLightbox(); });

    document.getElementById('lbPrev').addEventListener('click', () => {
      currentLb = Math.max(0, currentLb - 1);
      lbImg.src = lightboxPhotos[currentLb].src;
      lbCaption.textContent = lightboxPhotos[currentLb].caption || '';
    });

    document.getElementById('lbNext').addEventListener('click', () => {
      currentLb = Math.min(lightboxPhotos.length - 1, currentLb + 1);
      lbImg.src = lightboxPhotos[currentLb].src;
      lbCaption.textContent = lightboxPhotos[currentLb].caption || '';
    });

    document.addEventListener('keydown', (e) => {
      if (!lb.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') document.getElementById('lbPrev').click();
      if (e.key === 'ArrowRight') document.getElementById('lbNext').click();
    });
  </script>

</body>
</html>
