<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archivo 06</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;1,300&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      background-color: #0c0b09;
      color: #f0ebe3;
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    .wrapper {
      text-align: center;
      max-width: 500px;
      padding: 20px;
      opacity: 0;
      animation: appear 1.4s ease 0.3s forwards;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .file-label {
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(240, 235, 227, 0.2);
      display: block;
      margin-bottom: 40px;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 1.15rem;
      font-weight: 400;
      margin: 0 0 40px;
      color: rgba(240, 235, 227, 0.55);
      letter-spacing: 0.02em;
    }

    .countdown {
      font-size: 3.2rem;
      letter-spacing: 0.04em;
      font-weight: 300;
      color: #f0ebe3;
      word-wrap: break-word;
      max-width: 90%;
      line-height: 1;
    }

    .countdown .unit {
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(240, 235, 227, 0.3);
      display: block;
      margin-top: 12px;
    }

    .ready-msg {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.4rem;
      color: rgba(196, 112, 74, 0.9);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    @media (max-width: 600px) {
      .countdown { font-size: 2.2rem; }
      h1 { font-size: 1rem; }
    }
  </style>
</head>
<body>

<div class="wrapper">
  <span class="file-label">archivo 06</span>
  <h1>Este archivo se desbloqueará en</h1>
  <div class="countdown" id="countdown"></div>
</div>

<script>
  const targetDate = new Date("February 3, 2026 00:00:00").getTime();
  const countdownEl = document.getElementById("countdown");

  const x = setInterval(function () {
    const now = new Date().getTime();
    const distance = targetDate - now;

    if (distance < 0) {
      clearInterval(x);
      countdownEl.innerHTML = '<span class="ready-msg">El archivo está listo.</span>';
      setTimeout(() => {
        window.location.href = "prelancer.html";
      }, 4000);
      return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    countdownEl.innerHTML = `
      ${String(days).padStart(2,'0')}d&nbsp;
      ${String(hours).padStart(2,'0')}h&nbsp;
      ${String(minutes).padStart(2,'0')}m&nbsp;
      ${String(seconds).padStart(2,'0')}s
      <span class="unit">días · horas · minutos · segundos</span>
    `;
  }, 1000);
</script>

</body>
</html>
